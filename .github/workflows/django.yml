name: Django CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar sistema Django
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'django-insecure-ci-key-only' }}
          DEBUG: "False"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          python manage.py check

      - name: Recolectar archivos estáticos
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'django-insecure-ci-key-only' }}
          DEBUG: "False"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          python manage.py collectstatic --noinput

      - name: Ejecutar migraciones (base de datos de prueba)
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'django-insecure-ci-key-only' }}
          DEBUG: "False"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          python manage.py migrate

      - name: Ejecutar tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'django-insecure-ci-key-only' }}
          DEBUG: "False"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          python manage.py test

  deploy:
    runs-on: ubuntu-latest
    permissions: {}
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Desplegar en Render
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
